name: API — Build & Test

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build e testes
        run: ./mvnw verify -B

      - name: Upload relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/api/target/surefire-reports/
